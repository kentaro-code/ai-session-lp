<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIを使いこなせない理由、1〜2分でわかります｜髙橋健太郎</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: #e8eff6;
      font-family: 'Noto Sans JP', -apple-system, sans-serif;
    }

    /* ── LP幅コンテナ ── */
    .lp {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      box-shadow: 0 0 40px rgba(0,0,0,0.10);
      overflow: hidden;
    }

    /* ── セクション画像 ── */
    .lp-sec {
      display: block;
      position: relative;
      line-height: 0;
    }
    .lp-sec img {
      display: block;
      width: 100%;
      height: auto;
    }

    /* ── ヒーロー：画像全体をクリッカブルに ── */
    .hero-link { display: block; line-height: 0; }
    .btn-line-green {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #06C755;
      color: #fff;
      padding: 17px 20px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 16px rgba(6,199,85,0.35);
      transition: opacity 0.18s, transform 0.15s;
    }
    .btn-line-green:hover { opacity: 0.88; transform: translateY(-1px); }

    /* ── セクション間CTA ── */
    .mid-cta {
      background: #f0f7ff;
      padding: 28px 24px;
      text-align: center;
    }
    .mid-cta p {
      font-size: 13px;
      color: #5a7a9a;
      margin-bottom: 14px;
      line-height: 1.7;
    }
    .btn-cta-navy {
      display: block;
      background: #06C755;
      color: #fff;
      padding: 18px 20px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      text-align: center;
      letter-spacing: 0.02em;
      transition: opacity 0.18s, transform 0.15s;
    }
    .btn-cta-navy:hover { opacity: 0.88; transform: translateY(-1px); }


    /* ══════════════════════════
       ANIMATIONS
    ══════════════════════════ */

    /* ヒーローはロード時に即表示 */
    @keyframes heroIn {
      from { opacity: 0; transform: scale(1.02); }
      to   { opacity: 1; transform: none; }
    }
    .hero-sec {
      animation: heroIn 0.8s cubic-bezier(0.22, 0.68, 0, 1) both;
    }

    /* スクロールトリガー */
    [data-anim] {
      opacity: 0;
      transition:
        opacity  0.7s cubic-bezier(0.22, 0.68, 0, 1.1),
        transform 0.7s cubic-bezier(0.22, 0.68, 0, 1.1);
      transition-delay: var(--delay, 0s);
    }
    [data-anim="up"]   { transform: translateY(36px); }
    [data-anim="fade"] { }
    [data-anim].is-visible { opacity: 1; transform: none; }
  </style>
</head>
<body>

<div class="lp">

  <!-- ① ヒーロー -->
  <div class="lp-sec hero-sec">
    <a href="diagnostic.html" class="hero-link">

    </a>
  </div>

  <!-- ② こんな人に向いています -->
  <div class="lp-sec" data-anim="up" style="--delay:0s">
    <img src="images/section-02-target.png" alt="こんな人に向いています">

  <!-- ③ 2つの詰まり（2軸） -->
  <div class="lp-sec" data-anim="up" style="--delay:0s">

  <div class="lp-sec" data-anim="up" style="--delay:0s">
    <img src="images/section-04-quadrant.png" alt="あなたはどのタイプ？">
  </div>

  <!-- 中間CTA -->
  <div class="mid-cta" data-anim="fade" style="--delay:0.1s">
    <p>診断は無料・6問・1〜2分。<br>タイプと改善アドバイスがLINEで届きます。</p>
    <a href="diagnostic.html" class="btn-cta-navy">自分のタイプを診断する（無料）→</a>
  </div>

  <div class="lp-sec" data-anim="up" style="--delay:0s">
    <img src="images/section-05-flow.png" alt="診断はたった4STEPです">
    <a href="diagnostic.html" style="position:absolute; left:5%; right:5%; top:86%; height:9%; border-radius:10px; cursor:pointer;"></a>
  </div>

  <!-- ⑦ 診断後の変化（After） -->
  <div class="lp-sec" data-anim="up" style="--delay:0s">
    <img src="images/section-07-after.png" alt="診断後、少しずつ仕事が変わり始めます">
    <a href="diagnostic.html" style="position:absolute; left:5%; right:5%; top:87%; height:9%; border-radius:10px; cursor:pointer;"></a>
  </div>

  <!-- ⑧ プロフィール -->
  <div class="lp-sec" data-anim="up" style="--delay:0s">
    <img src="images/section-08-profile.png" alt="髙橋健太郎 プロフィール">
    <a href="diagnostic.html" style="position:absolute; left:5%; right:5%; top:84%; height:9%; border-radius:10px; cursor:pointer;"></a>
  </div>

  <!-- ⑨ フッターCTA -->
  <div class="lp-sec" data-anim="up" style="--delay:0s">
    <img src="images/section-09-cta.png" alt="AIを使いこなせない理由、まずは整理してみませんか">
    <a href="diagnostic.html" style="position:absolute; left:5%; right:5%; top:52%; height:11%; border-radius:10px; cursor:pointer;"></a>
  </div>

  <!-- 最終CTA（HTML） -->
  <div class="mid-cta" data-anim="fade" style="--delay:0.1s; background:#1C3557; padding:40px 24px 48px;">
    <p style="color:rgba(255,255,255,0.7); margin-bottom:18px;">診断は無料。費用は一切かかりません。</p>
    <a href="diagnostic.html" class="btn-line-green" style="font-size:17px; padding:20px;">無料診断を受ける（6問・1〜2分）→</a>
    <a href="https://lin.ee/vnhl9qv"
       style="display:block; margin-top:12px; color:rgba(255,255,255,0.6); font-size:13px; text-align:center; text-decoration:none;">
      まず話を聞いてほしい方 → 無料相談（30分）
    </a>
    <p style="font-size:11px; color:rgba(255,255,255,0.3); margin-top:16px;">どちらもLINEで完結します。</p>
  </div>

  <div style="background:#0b1520; color:rgba(255,255,255,0.2); text-align:center; padding:16px; font-size:12px;">
    © 2026 髙橋健太郎. All rights reserved.
  </div>

</div><!-- /.lp -->


<script>
  const observer = new IntersectionObserver(
    (entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          observer.unobserve(entry.target);
        }
      });
    },
    { threshold: 0.08 }
  );
  document.querySelectorAll('[data-anim]').forEach(el => observer.observe(el));
</script>

</body>
</html>
